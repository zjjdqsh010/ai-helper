<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用情况统计 - AI代码助手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1rem;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card h3 {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
        }

        .stat-card .unit {
            font-size: 0.9rem;
            color: #999;
            margin-left: 5px;
        }

        /* 主要内容 */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .content-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        /* 使用记录表格 */
        .usage-table {
            width: 100%;
            border-collapse: collapse;
        }

        .usage-table th {
            text-align: left;
            padding: 12px 8px;
            background: #f8f9fa;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid #eee;
        }

        .usage-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .usage-table tr:hover {
            background: #f8f9fa;
        }

        .usage-purpose {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .purpose-chat { background: #e3f2fd; color: #1976d2; }
        .purpose-review { background: #f3e5f5; color: #7b1fa2; }
        .purpose-debug { background: #fff3e0; color: #f57c00; }
        .purpose-optimize { background: #e8f5e8; color: #388e3c; }
        .purpose-explain { background: #fce4ec; color: #c2185b; }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover:not(:disabled) {
            background: #f8f9fa;
            border-color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .current-page {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border-radius: 6px;
        }

        /* 侧边栏 */
        .sidebar-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .sidebar-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .purpose-list {
            list-style: none;
        }

        .purpose-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .purpose-list li:last-child {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            margin-right: 8px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }

            .usage-table {
                font-size: 0.8rem;
            }

            .usage-table th,
            .usage-table td {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> 使用情况统计</h1>
            <p>查看您的AI助手使用情况和费用统计</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-mouse-pointer"></i>
                <h3>总请求数</h3>
                <div class="value" id="totalRequests">-</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-coins"></i>
                <h3>总Token消耗</h3>
                <div class="value" id="totalTokens">-</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-dollar-sign"></i>
                <h3>总费用</h3>
                <div class="value" id="totalCost">-<span class="unit">元</span></div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <h3>今日使用</h3>
                <div class="value" id="todayUsage">-</div>
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 使用记录列表 -->
            <div class="content-section">
                <div class="section-header">
                    <h2><i class="fas fa-history"></i> 使用记录</h2>
                    <div>
                        <select id="purposeFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                            <option value="">全部类型</option>
                            <option value="chat">智能对话</option>
                            <option value="code_review">代码审查</option>
                            <option value="debug">调试助手</option>
                            <option value="optimize">代码优化</option>
                            <option value="explain">代码解释</option>
                        </select>
                    </div>
                </div>

                <div id="loadingState" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                </div>

                <div id="errorState" class="error-message" style="display: none;"></div>

                <div id="tableContainer">
                    <table class="usage-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>功能</th>
                                <th>状态</th>
                                <th>响应时间</th>
                                <th>Token消耗</th>
                                <th>费用</th>
                            </tr>
                        </thead>
                        <tbody id="usageTableBody">
                            <!-- 数据将通过JavaScript填充 -->
                        </tbody>
                    </table>

                    <div class="pagination" id="pagination">
                        <!-- 分页控件将通过JavaScript生成 -->
                    </div>
                </div>
            </div>

            <!-- 侧边栏 -->
            <div class="content-section">
                <div class="sidebar-card">
                    <h3><i class="fas fa-chart-pie"></i> 功能使用分布</h3>
                    <ul class="purpose-list" id="purposeList">
                        <!-- 功能分布将通过JavaScript填充 -->
                    </ul>
                </div>

                <div class="sidebar-card">
                    <h3><i class="fas fa-calendar-week"></i> 最近7天</h3>
                    <div id="weeklyStats">
                        <!-- 周统计将通过JavaScript填充 -->
                    </div>
                </div>

                <div class="sidebar-card">
                    <h3><i class="fas fa-cog"></i> 操作</h3>
                    <button onclick="exportData()" style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px;">
                        <i class="fas fa-download"></i> 导出数据
                    </button>
                    <button onclick="refreshData()" style="width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer;">
                        <i class="fas fa-refresh"></i> 刷新数据
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/openai/api/usage';
        let currentPage = 0;
        let pageSize = 20;
        let totalPages = 0;
        let currentUserId = null;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 获取当前用户ID（这里需要从认证信息中获取）
            currentUserId = getCurrentUserId();
            loadUsageStats();
            loadUsageLogs();

            // 绑定筛选器事件
            document.getElementById('purposeFilter').addEventListener('change', function() {
                currentPage = 0;
                loadUsageLogs();
            });
        });

        // 获取当前用户ID（需要实现）
        function getCurrentUserId() {
            // 这里应该从认证信息中获取用户ID
            // 暂时返回示例ID
            return 1;
        }

        // 加载使用统计
        async function loadUsageStats() {
            try {
                const response = await fetch(`${API_BASE}/stats?userId=${currentUserId}`);
                if (response.ok) {
                    const stats = await response.json();
                    updateStatsDisplay(stats);
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 更新统计显示
        function updateStatsDisplay(stats) {
            document.getElementById('totalRequests').textContent = stats.totalRequests || 0;
            document.getElementById('totalTokens').textContent = stats.totalTokens || 0;
            document.getElementById('totalCost').textContent = (stats.totalCost || 0).toFixed(4);

            // 更新功能分布
            if (stats.purposeStats) {
                updatePurposeStats(stats.purposeStats);
            }

            // 计算今日使用量（需要后端支持）
            document.getElementById('todayUsage').textContent = '待实现';
        }

        // 更新功能分布
        function updatePurposeStats(purposeStats) {
            const purposeList = document.getElementById('purposeList');
            purposeList.innerHTML = '';

            const purposeNames = {
                'chat': '智能对话',
                'code_review': '代码审查',
                'debug': '调试助手',
                'optimize': '代码优化',
                'explain': '代码解释'
            };

            let total = Object.values(purposeStats).reduce((sum, count) => sum + count, 0);

            Object.entries(purposeStats).forEach(([purpose, count]) => {
                const percentage = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${purposeNames[purpose] || purpose}</span>
                    <span>${count} <small>(${percentage}%)</small></span>
                `;
                purposeList.appendChild(li);
            });
        }

        // 加载使用记录
        async function loadUsageLogs() {
            const purpose = document.getElementById('purposeFilter').value;
            const url = `${API_BASE}/logs?userId=${currentUserId}&page=${currentPage}&size=${pageSize}` +
                       (purpose ? `&purpose=${purpose}` : '');

            try {
                showLoading();
                const response = await fetch(url);
                if (response.ok) {
                    const pageData = await response.json();
                    updateUsageTable(pageData);
                    updatePagination(pageData);
                } else {
                    showError('加载数据失败');
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            }
        }

        // 显示加载状态
        function showLoading() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('errorState').style.display = 'none';
        }

        // 显示错误信息
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorState').textContent = message;
        }

        // 显示表格
        function showTable() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
            document.getElementById('errorState').style.display = 'none';
        }

        // 更新使用记录表格
        function updateUsageTable(pageData) {
            const tbody = document.getElementById('usageTableBody');
            tbody.innerHTML = '';

            if (!pageData.content || pageData.content.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #666;">暂无使用记录</td></tr>';
                showTable();
                return;
            }

            pageData.content.forEach(log => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${formatDateTime(log.createdAt)}</td>
                    <td><span class="usage-purpose purpose-${log.usagePurpose}">${getPurposeDisplayName(log.usagePurpose)}</span></td>
                    <td><span class="status-badge ${log.responseStatus === 200 ? 'status-success' : 'status-error'}">${log.responseStatus === 200 ? '成功' : '失败'}</span></td>
                    <td>${formatResponseTime(log.responseTime)}</td>
                    <td>${log.costTokens || 0}</td>
                    <td>¥${(log.costAmount || 0).toFixed(4)}</td>
                `;
                tbody.appendChild(row);
            });

            showTable();
        }

        // 更新分页控件
        function updatePagination(pageData) {
            totalPages = pageData.totalPages;
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            prevBtn.disabled = currentPage === 0;
            prevBtn.onclick = () => {
                if (currentPage > 0) {
                    currentPage--;
                    loadUsageLogs();
                }
            };
            pagination.appendChild(prevBtn);

            // 页码
            const startPage = Math.max(0, currentPage - 2);
            const endPage = Math.min(totalPages - 1, currentPage + 2);

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    const span = document.createElement('span');
                    span.className = 'current-page';
                    span.textContent = i + 1;
                    pagination.appendChild(span);
                } else {
                    const button = document.createElement('button');
                    button.textContent = i + 1;
                    button.onclick = () => {
                        currentPage = i;
                        loadUsageLogs();
                    };
                    pagination.appendChild(button);
                }
            }

            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
            nextBtn.disabled = currentPage >= totalPages - 1;
            nextBtn.onclick = () => {
                if (currentPage < totalPages - 1) {
                    currentPage++;
                    loadUsageLogs();
                }
            };
            pagination.appendChild(nextBtn);
        }

        // 工具函数
        function formatDateTime(dateTime) {
            if (!dateTime) return '-';
            const date = new Date(dateTime);
            return date.toLocaleString('zh-CN');
        }

        function formatResponseTime(time) {
            if (!time) return '-';
            if (time < 1000) {
                return time + 'ms';
            } else {
                return (time / 1000).toFixed(1) + 's';
            }
        }

        function getPurposeDisplayName(purpose) {
            const names = {
                'chat': '智能对话',
                'code_review': '代码审查',
                'debug': '调试助手',
                'optimize': '代码优化',
                'explain': '代码解释'
            };
            return names[purpose] || purpose;
        }

        // 刷新数据
        function refreshData() {
            currentPage = 0;
            loadUsageStats();
            loadUsageLogs();
        }

        // 导出数据
        function exportData() {
            alert('导出功能待实现');
        }
    </script>
</body>
</html>
