  secret: your-secret-key-here-1234567890-1234567890
  expiration: 86400000

# OpenAI and LongCat Configuration
langchain4j:
  openai:
    chat-model:
      api-key: ${OPENAI_API_KEY:ak_2I00bI7Nm6iC1Ly4wp89R20g7lV3N}
      model-name: ${OPENAI_MODEL:LongCat-Flash-Chat}
