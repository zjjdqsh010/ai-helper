<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - AI代码助手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3rem;
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .form-group input.error {
            border-color: #dc3545;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        .divider {
            color: #999;
            margin: 0 10px;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <h1>AI代码助手</h1>
            <p>创建您的账户</p>
        </div>

        <form id="registerForm">
            <div id="message" class="message" style="display: none;"></div>

            <div class="form-group">
                <label for="username">用户名 *</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
                <div class="hint">用户名用于登录，建议英文或数字</div>
            </div>

            <div class="form-group">
                <label for="email">邮箱地址 *</label>
                <input type="email" id="email" placeholder="请输入邮箱地址" required>
                <div class="hint">邮箱地址不能重复</div>
            </div>

            <div class="form-group">
                <label for="password">密码 *</label>
                <input type="password" id="password" placeholder="请输入密码" required>
                <div class="hint">密码至少需要6位字符</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码 *</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>

            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" placeholder="请输入昵称（可选）">
                <div class="hint">昵称会显示在您的个人资料中</div>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                <i class="fas fa-user-plus"></i>
                注册账户
            </button>
        </form>

        <div class="links">
            <a href="login.html">已有账户？立即登录</a>
            <span class="divider">|</span>
            <a href="auth-demo.html">演示页面</a>
        </div>
    </div>

    <script>
        const API_BASE = '/openai/api/auth';

        // DOM元素
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const registerBtn = document.getElementById('registerBtn');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const nicknameInput = document.getElementById('nickname');

        // 显示消息
        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        // 隐藏消息
        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        // 显示加载状态
        function setLoading(loading) {
            if (loading) {
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
            } else {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> 注册账户';
            }
        }

        // 验证邮箱格式
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // 注册函数
        async function register(username, email, password, nickname) {
            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username.trim(),
                        email: email.trim(),
                        password: password,
                        nickname: nickname.trim() || null
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // 注册成功，自动登录
                    localStorage.setItem('token', data.token);
                    showMessage('注册成功！正在跳转到主页面...', 'success');

                    // 延迟跳转到主页面
                    setTimeout(() => {
                        window.location.href = '/openai/';
                    }, 1500);
                } else {
                    // 注册失败
                    throw new Error(data.error || '注册失败');
                }
            } catch (error) {
                showMessage(error.message || '注册失败，请检查网络连接');
            }
        }

        // 表单验证
        function validateForm() {
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // 验证用户名
            if (!username) {
                showMessage('请输入用户名');
                usernameInput.focus();
                return false;
            }

            if (username.length < 3) {
                showMessage('用户名至少需要3个字符');
                usernameInput.focus();
                return false;
            }

            // 验证邮箱
            if (!email) {
                showMessage('请输入邮箱地址');
                emailInput.focus();
                return false;
            }

            if (!isValidEmail(email)) {
                showMessage('请输入有效的邮箱地址');
                emailInput.focus();
                return false;
            }

            // 验证密码
            if (!password) {
                showMessage('请输入密码');
                passwordInput.focus();
                return false;
            }

            if (password.length < 6) {
                showMessage('密码至少需要6位字符');
                passwordInput.focus();
                return false;
            }

            // 验证确认密码
            if (!confirmPassword) {
                showMessage('请确认密码');
                confirmPasswordInput.focus();
                return false;
            }

            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致');
                confirmPasswordInput.focus();
                return false;
            }

            return true;
        }

        // 表单提交处理
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            if (!validateForm()) {
                return;
            }

            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const nickname = nicknameInput.value.trim();

            setLoading(true);
            await register(username, email, password, nickname);
            setLoading(false);
        });

        // 回车提交支持
        confirmPasswordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                registerForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
