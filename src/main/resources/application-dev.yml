spring:
  config:
    activate:
      on-profile: dev

langchain4j:
  openai:
    chat-model:
      api-key: ${OPENAI_API_KEY:sk-demo-key}
      model-name: ${OPENAI_MODEL:gpt-4-turbo}
      base-url: ${LONGCAT_BASE_URL:http://localhost:8080/v1}
      temperature: 0.7
      max-tokens: 2000

logging:
  level:
    com.qsh.aicodehelper: DEBUG
    dev.langchain4j: DEBUG