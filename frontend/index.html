<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI代码助手 - 智能编程伙伴</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>AI代码助手</h1>
            </div>
            <p class="subtitle">智能编程伙伴，让代码更优雅</p>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                退出登录
            </button>
        </header>

        <!-- 主要功能区域 -->
        <main class="main-content">
            <!-- 功能选择标签 -->
            <div class="function-tabs">
                <button class="tab-btn active" data-tab="chat">
                    <i class="fas fa-comments"></i>
                    <span>智能对话</span>
                </button>
                <button class="tab-btn" data-tab="code-review">
                    <i class="fas fa-search"></i>
                    <span>代码审查</span>
                </button>
                <button class="tab-btn" data-tab="debug">
                    <i class="fas fa-bug"></i>
                    <span>调试助手</span>
                </button>
                <button class="tab-btn" data-tab="optimize">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>代码优化</span>
                </button>
                <button class="tab-btn" data-tab="explain">
                    <i class="fas fa-book"></i>
                    <span>代码解释</span>
                </button>
            </div>

            <!-- 功能内容区域 -->
            <div class="tab-content">
                <!-- 智能对话 -->
                <div class="content-panel active" id="chat-panel">
                    <div class="input-section">
                        <label for="chat-message">请输入您的问题：</label>
                        <textarea id="chat-message" placeholder="例如：如何优化Java代码的性能？"></textarea>
                        <div class="input-row">
                            <input type="text" id="session-id" placeholder="会话ID（可选）">
                            <button class="btn-primary" onclick="sendChat()">
                                <i class="fas fa-paper-plane"></i>
                                发送
                            </button>
                        </div>
                    </div>
                    <div class="response-section">
                        <h3>AI回复：</h3>
                        <div class="response-box" id="chat-response"></div>
                    </div>
                </div>

                <!-- 代码审查 -->
                <div class="content-panel" id="code-review-panel">
                    <div class="input-section">
                        <label for="review-code">请输入待审查的代码：</label>
                        <textarea id="review-code" placeholder="粘贴您的代码..."></textarea>
                        <div class="input-row">
                            <select id="code-language">
                                <option value="java">Java</option>
                                <option value="python">Python</option>
                                <option value="javascript">JavaScript</option>
                                <option value="cpp">C++</option>
                                <option value="go">Go</option>
                                <option value="rust">Rust</option>
                            </select>
                            <button class="btn-primary" onclick="sendCodeReview()">
                                <i class="fas fa-check-circle"></i>
                                开始审查
                            </button>
                        </div>
                    </div>
                    <div class="response-section">
                        <h3>审查结果：</h3>
                        <div class="response-box" id="review-response"></div>
                    </div>
                </div>

                <!-- 调试助手 -->
                <div class="content-panel" id="debug-panel">
                    <div class="input-section">
                        <label for="debug-code">问题代码：</label>
                        <textarea id="debug-code" placeholder="粘贴包含问题的代码..."></textarea>
                        <label for="error-message">错误信息：</label>
                        <textarea id="error-message" placeholder="描述错误信息或异常堆栈..."></textarea>
                        <button class="btn-primary" onclick="sendDebug()">
                            <i class="fas fa-bug"></i>
                            开始调试
                        </button>
                    </div>
                    <div class="response-section">
                        <h3>调试分析：</h3>
                        <div class="response-box" id="debug-response"></div>
                    </div>
                </div>

                <!-- 代码优化 -->
                <div class="content-panel" id="optimize-panel">
                    <div class="input-section">
                        <label for="optimize-code">请输入待优化的代码：</label>
                        <textarea id="optimize-code" placeholder="粘贴需要优化的代码..."></textarea>
                        <button class="btn-primary" onclick="sendOptimize()">
                            <i class="fas fa-magic"></i>
                            开始优化
                        </button>
                    </div>
                    <div class="response-section">
                        <h3>优化建议：</h3>
                        <div class="response-box" id="optimize-response"></div>
                    </div>
                </div>

                <!-- 代码解释 -->
                <div class="content-panel" id="explain-panel">
                    <div class="input-section">
                        <label for="explain-code">请输入需要解释的代码：</label>
                        <textarea id="explain-code" placeholder="粘贴需要解释的代码..."></textarea>
                        <button class="btn-primary" onclick="sendExplain()">
                            <i class="fas fa-lightbulb"></i>
                            开始解释
                        </button>
                    </div>
                    <div class="response-section">
                        <h3>代码解释：</h3>
                        <div class="response-box" id="explain-response"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <i class="fas fa-circle status-indicator" id="status-indicator"></i>
                <span id="status-text">就绪</span>
            </div>
            <div class="status-item">
                <i class="fas fa-server"></i>
                <span>API状态: <span id="api-status">正常</span></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
